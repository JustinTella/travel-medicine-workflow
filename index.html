<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel Medicine Workflow</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">

    <header class="page-header">
      <div class="header-text">
        <p class="eyebrow">Concierge Travel Medicine</p>
        <h1>Patient Workflow Dashboard</h1>
      </div>
      <div class="header-actions">
        <a
          href="https://docs.google.com/spreadsheets/d/1og96N5wkXKgoJu-28UaNm4r-uMaVYi3vTEGmXdiH2bM/edit?gid=658794948#gid=658794948"
          target="_blank"
          rel="noopener noreferrer"
          class="sheet-link"
        >View Responses ↗</a>
        <span id="sync-status" data-state="syncing">Connecting…</span>
      </div>
    </header>

    <!-- Summary counts -->
    <div class="stats-bar" id="stats-bar"></div>

    <!-- Search -->
    <div class="list-controls">
      <input
        id="search"
        type="search"
        placeholder="Search by patient name or destination…"
        class="search-input"
        oninput="onSearch()"
        autocomplete="off"
      />
    </div>

    <!-- Archive drawer (shown when Archived stat card is clicked) -->
    <div id="archive-drawer"></div>

    <!-- Patient rows -->
    <section>
      <div id="patient-list" class="patient-list"></div>
    </section>

  </div>
  <script src="app.js"></script>
</body>
</html>
